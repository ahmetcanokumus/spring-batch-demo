spring.application.name=spring-batch-demo

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/batchdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Spring Batch: meta tablolar (BATCH_JOB_INSTANCE vb.) ve job otomatik calismasin
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

server.port=8080

logging.level.org.springframework.batch=INFO
logging.level.com.example.springbatchdemo=INFO
